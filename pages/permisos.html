<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Permisos Perfil | Sistema Corporativo</title>
  <link rel="stylesheet" href="../assets/css/styles.css" />
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="topbar-inner">
        <div class="brand-wrap">
          <div class="brand-logo">PC</div>
          <div class="brand-text">
            <h1>Sistema Corporativo</h1>
            <p>Seguridad / Permisos Perfil</p>
          </div>
        </div>

        <div class="topbar-right">
          <span class="user-badge" id="topUserName">Usuario</span>
          <button class="logout-btn" id="logoutBtn">Salir</button>
        </div>
      </div>
    </header>

    <nav class="main-nav">
      <div class="main-nav-inner" id="dynamicTopNav"></div>
    </nav>

    <main class="page-container">
      <div class="breadcrumbs">
        Inicio / Seguridad / <strong>Permisos Perfil</strong>
      </div>

      <section class="page-header-card">
        <h2>Permisos Perfil</h2>
        <p>Asigna permisos por perfil usando una tabla tipo matriz.</p>
      </section>

      <section class="action-card">
        <div class="form-group">
          <label for="perfilFiltroPermisos">Perfil</label>
          <div style="display:grid; grid-template-columns: 1fr auto; gap:10px;">
            <select id="perfilFiltroPermisos"></select>
            <button class="btn btn-green" id="btnBuscarPermisos">Buscar</button>
          </div>
        </div>
      </section>

      <section class="content-card">
        <div class="table-wrap">
          <table class="custom-table">
            <thead>
              <tr>
                <th>Módulo</th>
                <th>Agregar</th>
                <th>Editar</th>
                <th>Eliminar</th>
                <th>Consultar</th>
                <th>Detalle</th>
              </tr>
            </thead>
            <tbody id="permissionsMatrixBody"></tbody>
          </table>
        </div>

        <div style="display:flex; justify-content:flex-end; gap:10px; margin-top:18px;">
          <button class="btn btn-green" id="btnGuardarPermisos">Guardar</button>
          <button class="btn btn-gray" id="btnCancelarPermisos">Cancelar</button>
        </div>
      </section>
    </main>
  </div>

<script src="../assets/js/config.js"></script>
<script src="../assets/js/auth.js"></script>
<script src="../assets/js/navbar-dropdown.js"></script>
<script src="../assets/js/app.js"></script>
<script src="../assets/js/module-permissions.js"></script>
<script src="../assets/js/permisos-api.js"></script>
</body>
</html>
