<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Usuario | Sistema Corporativo</title>
  <link rel="stylesheet" href="../assets/css/styles.css" />
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="topbar-inner">
        <div class="brand-wrap">
          <div class="brand-logo">PC</div>
          <div class="brand-text">
            <h1>Sistema Corporativo</h1>
            <p>Seguridad / Usuario</p>
          </div>
        </div>

        <div class="topbar-right">
          <span class="user-badge" id="topUserName">Usuario</span>
          <button class="logout-btn" id="logoutBtn">Salir</button>
        </div>
      </div>
    </header>

    <nav class="main-nav">
      <div class="main-nav-inner" id="dynamicTopNav"></div>
    </nav>

    <main class="page-container">
      <div class="breadcrumbs">
        Inicio / Seguridad / <strong>Usuario</strong>
      </div>

      <section class="page-header-card">
        <h2>Módulo Usuario</h2>
        <p>Gestión de usuarios con imagen, perfil, estado y contacto.</p>
      </section>

      <section class="action-card">
        <div class="btn-row">
          <button class="btn btn-green" id="btnNuevoUsuario">Nuevo</button>
          <button class="btn btn-blue" id="btnRecargarUsuarios">Consultar</button>
        </div>
      </section>

      <section class="content-card">
        <div class="table-wrap">
          <table class="custom-table">
            <thead>
              <tr>
                <th>Imagen</th>
                <th>Usuario</th>
                <th>Perfil</th>
                <th>Estado</th>
                <th>Correo</th>
                <th>Celular</th>
                <th>Acciones</th>
              </tr>
            </thead>
            <tbody id="usuariosTableBody"></tbody>
          </table>
        </div>
      </section>
    </main>
  </div>

<script src="../assets/js/config.js"></script>
<script src="../assets/js/auth.js"></script>
<script src="../assets/js/navbar-dropdown.js"></script>
<script src="../assets/js/app.js"></script>
<script src="../assets/js/module-permissions.js"></script>
<script src="../assets/js/usuarios-api.js"></script>
</body>
</html>
