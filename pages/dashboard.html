<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard | Proyecto JS</title>
  <link rel="stylesheet" href="../assets/css/styles.css" />
  <link rel="stylesheet" href="../assets/css/dashboard.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">Proyecto JS</div>
    <nav class="nav-links" id="mainNav"></nav>
  </header>

  <main class="main-container">
    <section class="breadcrumbs">
      <span>Inicio</span>
    </section>

    <section class="welcome-card">
      <h1>Bienvenido al sistema</h1>
      <p id="welcomeUser"></p>
    </section>

    <section class="cards-grid" id="dashboardCards"></section>
  </main>

  <script src="../assets/js/data.js"></script>
  <script src="../assets/js/auth.js"></script>
  <script src="../assets/js/permissions.js"></script>
  <script src="../assets/js/app.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const cardsContainer = document.getElementById("dashboardCards");
      const modulos = JSON.parse(localStorage.getItem(STORAGE_KEYS.MODULOS)) || [];
      const visibles = modulos.filter((m) => hasPermission(m.nombre, "consulta") && m.nombre !== "Dashboard");

      cardsContainer.innerHTML = visibles.map((modulo) => `
        <div class="module-card">
          <h2>${modulo.nombre}</h2>
          <p>Accede al módulo ${modulo.nombre}.</p>
          <a href="${modulo.ruta}" class="btn btn-primary">Ir al módulo</a>
        </div>
      `).join("");
    });
  </script>
</body>
</html>
