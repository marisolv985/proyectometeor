<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard | Sistema Corporativo</title>
  <link rel="stylesheet" href="../assets/css/styles.css" />
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="topbar-inner">
        <div class="brand-wrap">
          <div class="brand-logo">PC</div>
          <div class="brand-text">
            <h1>Sistema Corporativo</h1>
            <p>Panel principal</p>
          </div>
        </div>

        <div class="topbar-right">
          <span class="user-badge" id="topUserName">Usuario</span>
          <button class="logout-btn" id="logoutBtn">Salir</button>
        </div>
      </div>
    </header>

    <nav class="main-nav">
      <div class="main-nav-inner" id="dynamicTopNav"></div>
    </nav>

    <main class="page-container">
      <div class="breadcrumbs">
        Inicio / <strong>Dashboard</strong>
      </div>

      <section class="page-header-card">
        <h2>Dashboard</h2>
        <p>Accede a los módulos permitidos según tu perfil.</p>
      </section>

      <section class="cards-grid" id="dashboardCards"></section>

      <section class="content-card">
        <h3 style="font-size:2rem; color:#163A70; margin-bottom:12px;">Bienvenido al sistema</h3>
        <p style="color:#526173; font-size:1.05rem;">
          Este sistema implementa autenticación, navegación por módulos,
          permisos por perfil, pantallas estáticas y diseño responsivo.
        </p>
      </section>
    </main>
  </div>

<script src="../assets/js/config.js"></script>
<script src="../assets/js/auth.js"></script>
<script src="../assets/js/navbar-dropdown.js"></script>
<script src="../assets/js/app.js"></script>
<script src="../assets/js/dashboard-api.js"></script>
</body>
</html>
