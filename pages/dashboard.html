<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard | Proyecto JS</title>
  <link rel="stylesheet" href="../assets/css/styles.css" />
  <link rel="stylesheet" href="../assets/css/dashboard.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">Proyecto JS</div>
    <nav class="nav-links">
      <a href="./dashboard.html">Inicio</a>
      <a href="./perfiles.html">Perfiles</a>
      <a href="#" id="logoutBtn">Cerrar sesión</a>
    </nav>
  </header>

  <main class="main-container">
    <section class="breadcrumbs">
      <span>Inicio</span>
    </section>

    <section class="welcome-card">
      <h1>Bienvenido al sistema</h1>
      <p id="welcomeUser"></p>
    </section>

    <section class="cards-grid">
      <div class="module-card">
        <h2>Perfiles</h2>
        <p>Administra los perfiles del sistema.</p>
        <a href="./perfiles.html" class="btn btn-primary">Ir al módulo</a>
      </div>

      <div class="module-card">
        <h2>Módulos</h2>
        <p>Próximamente.</p>
        <button class="btn btn-secondary" disabled>No disponible</button>
      </div>

      <div class="module-card">
        <h2>Usuarios</h2>
        <p>Próximamente.</p>
        <button class="btn btn-secondary" disabled>No disponible</button>
      </div>

      <div class="module-card">
        <h2>Permisos Perfil</h2>
        <p>Próximamente.</p>
        <button class="btn btn-secondary" disabled>No disponible</button>
      </div>
    </section>
  </main>

  <script src="../assets/js/data.js"></script>
  <script src="../assets/js/auth.js"></script>
  <script src="../assets/js/app.js"></script>
</body>
</html>
