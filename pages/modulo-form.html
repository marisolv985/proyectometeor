<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Formulario Módulo | Proyecto JS</title>
  <link rel="stylesheet" href="../assets/css/styles.css" />
  <link rel="stylesheet" href="../assets/css/crud.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">Proyecto JS</div>
    <nav class="nav-links">
      <a href="./dashboard.html">Inicio</a>
      <a href="./perfiles.html">Perfiles</a>
      <a href="./modulos.html">Módulos</a>
      <a href="./usuarios.html">Usuarios</a>
      <a href="#" id="logoutBtn">Cerrar sesión</a>
    </nav>
  </header>

  <main class="main-container">
    <section class="breadcrumbs">
      <a href="./dashboard.html">Inicio</a>
      <span>/</span>
      <a href="./modulos.html">Módulos</a>
      <span>/</span>
      <span id="moduloFormTitleBreadcrumb">Nuevo</span>
    </section>

    <section class="page-header">
      <div>
        <h1 id="moduloFormTitle">Nuevo Módulo</h1>
        <p>Completa la información del módulo.</p>
      </div>
    </section>

    <section class="card form-card">
      <form id="moduloForm">
        <input type="hidden" id="moduloId" />

        <div class="form-group">
          <label for="nombreModulo">Nombre del módulo</label>
          <input type="text" id="nombreModulo" required />
        </div>

        <div class="form-group">
          <label for="claveModulo">Clave</label>
          <input type="text" id="claveModulo" required />
        </div>

        <div class="form-group">
          <label for="rutaModulo">Ruta</label>
          <input type="text" id="rutaModulo" placeholder="./perfiles.html" required />
        </div>

        <div class="form-group">
          <label for="tipoModulo">Tipo</label>
          <select id="tipoModulo" required>
            <option value="">Selecciona una opción</option>
            <option value="CRUD">CRUD</option>
            <option value="ESTATICO">Estático</option>
          </select>
        </div>

        <div class="form-actions">
          <a href="./modulos.html" class="btn btn-secondary">Cancelar</a>
          <button type="submit" class="btn btn-primary">Guardar</button>
        </div>
      </form>
    </section>
  </main>

  <script src="../assets/js/data.js"></script>
  <script src="../assets/js/auth.js"></script>
  <script src="../assets/js/modulos.js"></script>
</body>
</html>
