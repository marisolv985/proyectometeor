<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Perfil | Sistema Corporativo</title>
  <link rel="stylesheet" href="../assets/css/styles.css" />
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="topbar-inner">
        <div class="brand-wrap">
          <div class="brand-logo">PC</div>
          <div class="brand-text">
            <h1>Sistema Corporativo</h1>
            <p>Seguridad / Perfil</p>
          </div>
        </div>

        <div class="topbar-right">
          <span class="user-badge" id="topUserName">Usuario</span>
          <button class="logout-btn" id="logoutBtn">Salir</button>
        </div>
      </div>
    </header>

    <nav class="main-nav">
      <div class="main-nav-inner" id="dynamicTopNav"></div>
    </nav>

    <main class="page-container">
      <div class="breadcrumbs">
        Inicio / Seguridad / <strong>Perfil</strong>
      </div>

      <section class="page-header-card">
        <h2>Módulo Perfil</h2>
        <p>CRUD de perfiles con validación y paginación de 5 registros.</p>
      </section>

      <section class="action-card">
        <div class="btn-row">
          <button class="btn btn-green" id="btnNuevoPerfil">Nuevo</button>
          <button class="btn btn-blue" id="btnRecargarPerfiles">Consultar</button>
        </div>
      </section>

      <section class="content-card">
        <div class="table-wrap">
          <table class="custom-table">
            <thead>
              <tr>
                <th>Nombre Perfil</th>
                <th>Administrador</th>
                <th>Acciones</th>
              </tr>
            </thead>
            <tbody id="perfilesTableBody"></tbody>
          </table>
        </div>
      </section>
    </main>
  </div>

<script src="../assets/js/config.js"></script>
<script src="../assets/js/auth.js"></script>
<script src="../assets/js/navbar-dropdown.js"></script>
<script src="../assets/js/app.js"></script>
<script src="../assets/js/module-permissions.js"></script>
<script src="../assets/js/perfiles-api.js"></script>
</body>
</html>
