<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Perfiles | Proyecto JS</title>
  <link rel="stylesheet" href="../assets/css/styles.css" />
  <link rel="stylesheet" href="../assets/css/crud.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">Proyecto JS</div>
    <nav class="nav-links" id="mainNav"></nav>
  </header>

  <main class="main-container">
    <section class="breadcrumbs">
      <a href="./dashboard.html">Inicio</a>
      <span>/</span>
      <span>Perfiles</span>
    </section>

    <section class="page-header">
      <div>
        <h1>Gestión de Perfiles</h1>
        <p>Consulta, crea, edita, elimina y visualiza perfiles.</p>
      </div>
      <a href="./perfil-form.html" class="btn btn-primary" id="btnNuevoPerfil">Nuevo perfil</a>
    </section>

    <section class="card">
      <div class="toolbar">
        <div class="search-box">
          <input type="text" id="perfilSearch" placeholder="Buscar perfil..." />
        </div>
      </div>

      <div class="table-responsive">
        <table class="custom-table">
          <thead>
            <tr>
              <th>#</th>
              <th>Nombre del perfil</th>
              <th>Administrador</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody id="perfilesTableBody"></tbody>
        </table>
      </div>

      <div class="pagination" id="perfilesPagination"></div>
    </section>
  </main>

  <script src="../assets/js/data.js"></script>
  <script src="../assets/js/auth.js"></script>
  <script src="../assets/js/ui.js"></script>
  <script src="../assets/js/permissions.js"></script>
  <script src="../assets/js/perfiles.js"></script>
</body>
</html>
