<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | Sistema Corporativo</title>
  <link rel="stylesheet" href="../assets/css/styles.css" />
</head>
<body class="login-page">

  <div class="login-card-enterprise">
    <div class="login-top">
      <div class="brand-logo">PC</div>
      <div class="login-title">
        <h2>Bienvenido</h2>
        <p>Sistema Corporativo - Desarrollo Web Profesional</p>
      </div>
    </div>

    <div class="login-divider"></div>

    <form id="loginForm" class="login-form-grid">
      <div class="form-group">
        <label for="correo">Usuario</label>
        <input type="email" id="correo" placeholder="admin@proyecto.com" required />
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <input type="password" id="password" placeholder="********" required />
      </div>

      <div class="form-group">
        <label for="captchaInput">Captcha</label>
        <div style="display:flex; gap:10px; align-items:center;">
          <div id="fakeCaptchaBox" style="min-width:96px; text-align:center; padding:10px 14px; border:1px dashed #4C6FB3; border-radius:12px; color:#163A70; font-weight:bold; background:#F6F9FF;">Z755</div>
          <button type="button" id="refreshCaptcha" class="btn btn-gray" style="padding:10px 14px;">↻</button>
        </div>
        <input type="text" id="captchaInput" placeholder="Escribe el captcha" required />
      </div>

      <div style="display:flex; justify-content:flex-end;">
        <button type="submit" class="btn btn-green">Ingresar</button>
      </div>
    </form>

    <div id="loginMessage" class="message-box"></div>
  </div>

<script src="../assets/js/config.js"></script>
<script src="../assets/js/auth.js"></script>
<script src="../assets/js/login.js"></script>
</body>
</html>
