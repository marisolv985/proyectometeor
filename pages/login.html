<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | Proyecto JS</title>
  <link rel="stylesheet" href="../assets/css/styles.css" />
  <link rel="stylesheet" href="../assets/css/login.css" />
</head>
<body class="login-body">

  <div class="login-container">
    <div class="login-card">
      <h1>Iniciar sesión</h1>
      <p class="subtitle">Sistema de gestión</p>

      <form id="loginForm">
        <div class="form-group">
          <label for="correo">Correo</label>
          <input type="email" id="correo" placeholder="correo@ejemplo.com" required />
        </div>

        <div class="form-group">
          <label for="password">Contraseña</label>
          <div class="password-box">
            <input type="password" id="password" placeholder="********" required />
            <button type="button" id="togglePassword">Ver</button>
          </div>
        </div>

        <button type="submit" class="btn btn-primary btn-block">Entrar</button>
      </form>

      <div id="loginMessage" class="message-box"></div>

      <div class="demo-users">
        <h3>Usuarios de prueba</h3>
        <p><strong>Admin:</strong> admin@demo.com / 123456</p>
        <p><strong>Editor:</strong> editor@demo.com / 123456</p>
        <p><strong>Consulta:</strong> consulta@demo.com / 123456</p>
      </div>
    </div>
  </div>

  <script src="../assets/js/data.js"></script>
  <script src="../assets/js/auth.js"></script>
  <script src="../assets/js/login.js"></script>
</body>
</html>
