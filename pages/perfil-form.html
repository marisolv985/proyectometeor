<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Formulario Perfil | Sistema Corporativo</title>
  <link rel="stylesheet" href="../assets/css/styles.css" />
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="topbar-inner">
        <div class="brand-wrap">
          <div class="brand-logo">PC</div>
          <div class="brand-text">
            <h1>Sistema Corporativo</h1>
            <p>Seguridad / Perfil</p>
          </div>
        </div>

        <div class="topbar-right">
          <span class="user-badge" id="topUserName">Usuario</span>
          <button class="logout-btn" id="logoutBtn">Salir</button>
        </div>
      </div>
    </header>

    <nav class="main-nav">
      <div class="main-nav-inner" id="dynamicTopNav"></div>
    </nav>

    <main class="page-container">
      <div class="breadcrumbs" id="perfilFormBreadcrumb">
        Inicio / Seguridad / Perfil / <strong>Nuevo</strong>
      </div>

      <section class="page-header-card">
        <h2 id="perfilFormTitle">Nuevo Perfil</h2>
        <p id="perfilFormSubtitle">Captura la información del perfil.</p>
      </section>

      <section class="content-card">
        <form id="perfilForm">
          <div class="form-grid">
            <div class="form-group">
              <label for="strNombrePerfil">Nombre del perfil</label>
              <input type="text" id="strNombrePerfil" placeholder="Ej. Supervisor" required />
            </div>

            <div class="form-group">
              <label for="bitAdministrador">Administrador</label>
              <select id="bitAdministrador" required>
                <option value="false">No</option>
                <option value="true">Sí</option>
              </select>
            </div>
          </div>

          <div id="perfilFormMessage" class="message-box"></div>

          <div style="display:flex; justify-content:flex-end; gap:10px; margin-top:18px;">
            <button type="submit" class="btn btn-green" id="btnGuardarPerfil">Guardar</button>
            <a href="./perfiles.html" class="btn btn-gray">Cancelar</a>
          </div>
        </form>
      </section>
    </main>
  </div>

  <script src="../assets/js/config.js"></script>
  <script src="../assets/js/auth.js"></script>
  <script src="../assets/js/navbar-dropdown.js"></script>
  <script src="../assets/js/app.js"></script>
  <script src="../assets/js/module-permissions.js"></script>
  <script src="../assets/js/perfil-form.js"></script>
</body>
</html>
