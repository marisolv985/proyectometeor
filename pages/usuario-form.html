<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Formulario Usuario | Proyecto JS</title>
  <link rel="stylesheet" href="../assets/css/styles.css" />
  <link rel="stylesheet" href="../assets/css/crud.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">Proyecto JS</div>
    <nav class="nav-links">
      <a href="./dashboard.html">Inicio</a>
      <a href="./perfiles.html">Perfiles</a>
      <a href="./modulos.html">Módulos</a>
      <a href="./usuarios.html">Usuarios</a>
      <a href="#" id="logoutBtn">Cerrar sesión</a>
    </nav>
  </header>

  <main class="main-container">
    <section class="breadcrumbs">
      <a href="./dashboard.html">Inicio</a>
      <span>/</span>
      <a href="./usuarios.html">Usuarios</a>
      <span>/</span>
      <span id="usuarioFormTitleBreadcrumb">Nuevo</span>
    </section>

    <section class="page-header">
      <div>
        <h1 id="usuarioFormTitle">Nuevo Usuario</h1>
        <p>Completa la información del usuario.</p>
      </div>
    </section>

    <section class="card form-card">
      <form id="usuarioForm">
        <input type="hidden" id="usuarioId" />

        <div class="form-group">
          <label for="nombreUsuario">Nombre</label>
          <input type="text" id="nombreUsuario" required />
        </div>

        <div class="form-group">
          <label for="correoUsuario">Correo</label>
          <input type="email" id="correoUsuario" required />
        </div>

        <div class="form-group">
          <label for="passwordUsuario">Contraseña</label>
          <input type="text" id="passwordUsuario" required />
        </div>

        <div class="form-group">
          <label for="perfilUsuario">Perfil</label>
          <select id="perfilUsuario" required></select>
        </div>

        <div class="form-group">
          <label for="estadoUsuario">Estado</label>
          <select id="estadoUsuario" required>
            <option value="">Selecciona una opción</option>
            <option value="Activo">Activo</option>
            <option value="Inactivo">Inactivo</option>
          </select>
        </div>

        <div class="form-actions">
          <a href="./usuarios.html" class="btn btn-secondary">Cancelar</a>
          <button type="submit" class="btn btn-primary">Guardar</button>
        </div>
      </form>
    </section>
  </main>

  <script src="../assets/js/data.js"></script>
  <script src="../assets/js/auth.js"></script>
  <script src="../assets/js/usuarios.js"></script>
</body>
</html>
