<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Formulario Usuario | Sistema Corporativo</title>
  <link rel="stylesheet" href="../assets/css/styles.css" />
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="topbar-inner">
        <div class="brand-wrap">
          <div class="brand-logo">PC</div>
          <div class="brand-text">
            <h1>Sistema Corporativo</h1>
            <p>Seguridad / Usuario</p>
          </div>
        </div>

        <div class="topbar-right">
          <span class="user-badge" id="topUserName">Usuario</span>
          <button class="logout-btn" id="logoutBtn">Salir</button>
        </div>
      </div>
    </header>

    <nav class="main-nav">
      <div class="main-nav-inner" id="dynamicTopNav"></div>
    </nav>

    <main class="page-container">
      <div class="breadcrumbs" id="usuarioFormBreadcrumb">
        Inicio / Seguridad / Usuario / <strong>Nuevo</strong>
      </div>

      <section class="page-header-card">
        <h2 id="usuarioFormTitle">Nuevo Usuario</h2>
        <p id="usuarioFormSubtitle">Captura la información del usuario.</p>
      </section>

      <section class="content-card">
        <form id="usuarioForm">
          <div class="form-grid">
            <div class="form-group">
              <label for="strNombreUsuario">Nombre del usuario</label>
              <input type="text" id="strNombreUsuario" required />
            </div>

            <div class="form-group">
              <label for="strCorreo">Correo</label>
              <input type="email" id="strCorreo" required />
            </div>

            <div class="form-group">
              <label for="strPwd">Contraseña</label>
              <input type="password" id="strPwd" required />
            </div>

            <div class="form-group">
              <label for="strNumeroCelular">Número celular</label>
              <input type="text" id="strNumeroCelular" />
            </div>

            <div class="form-group">
              <label for="idPerfil">Perfil</label>
              <select id="idPerfil" required></select>
            </div>

            <div class="form-group">
              <label for="idEstadoUsuario">Estado</label>
              <select id="idEstadoUsuario" required></select>
            </div>

            <div class="form-group">
              <label for="fotoUsuario">Foto de perfil</label>
              <input type="file" id="fotoUsuario" accept="image/*" />
            </div>
          </div>

          <div id="usuarioFormMessage" class="message-box"></div>

          <div style="display:flex; justify-content:flex-end; gap:10px; margin-top:18px;">
            <button type="submit" class="btn btn-green">Guardar</button>
            <a href="./usuarios.html" class="btn btn-gray">Cancelar</a>
          </div>
        </form>
      </section>
    </main>
  </div>

  <script src="../assets/js/config.js"></script>
  <script src="../assets/js/auth.js"></script>
  <script src="../assets/js/navbar-dropdown.js"></script>
  <script src="../assets/js/app.js"></script>
  <script src="../assets/js/module-permissions.js"></script>
  <script src="../assets/js/usuario-form.js"></script>
</body>
</html>
