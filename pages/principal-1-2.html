<!DOCTYPE html>
<html lang="es">
<head>

  <link rel="stylesheet" href="../assets/css/styles.css" />
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="topbar-inner">
        <div class="brand-wrap">
          <div class="brand-logo">PC</div>
          <div class="brand-text">
            <h1>Sistema Corporativo</h1>
            <p>Principal 1 / Principal 1.1</p>
          </div>
        </div>

        <div class="topbar-right">

          <button class="logout-btn" id="logoutBtn">Salir</button>
        </div>
      </div>
    </header>

    <nav class="main-nav">
      <div class="main-nav-inner" id="dynamicTopNav"></div>
    </nav>

    <main class="page-container">
      <div class="breadcrumbs">
        Inicio / Principal 1 / <strong>Principal 1.1</strong>

          <button class="btn btn-orange">Editar</button>
          <button class="btn btn-red">Eliminar</button>
          <button class="btn btn-gray">Detalle</button>
        </div>

        <div class="form-grid">
          <div class="form-group">
            <label>Campo 1</label>
            <input type="text" placeholder="Escribe aquí" />
          </div>

          <div class="form-group">
            <label>Campo 2</label>
            <input type="text" placeholder="Escribe aquí" />
          </div>

          <div class="form-group">
            <label>Campo 3</label>
            <select>
              <option>Seleccione</option>
            </select>
          </div>

          <div class="form-group">
            <label>Campo 4</label>
            <input type="date" />
          </div>
        </div>
      </section>
    </main>
  </div>

  <script src="../assets/js/config.js"></script>
  <script src="../assets/js/auth.js"></script>
  <script src="../assets/js/navbar-dropdown.js"></script>
  <script src="../assets/js/app.js"></script>
